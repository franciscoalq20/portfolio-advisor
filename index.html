<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio Advisor</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{background:#f7f6f2;color:#1a1815;font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#d4cfc7;border-radius:3px}
.mono{font-family:'IBM Plex Mono',monospace!important}
.serif{font-family:'Playfair Display',serif!important}
input,select,textarea{font-family:'DM Sans',sans-serif;background:#fff;border:1px solid #e8e5df;color:#1a1815;border-radius:6px;padding:8px 11px;font-size:13px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#2a4fd4}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script>
var FINNHUB_KEY = "d6tia3pr01qhkb44abr0d6tia3pr01qhkb44abrg";

var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useCallback = React.useCallback;
var useRef = React.useRef;

var SK_P = "adv-p-v1", SK_H = "adv-h-v1";
function sget(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var TYPES=[
  {id:"crypto",l:"Crypto",c:"#e67e22"},
  {id:"us_stock",l:"US Equity",c:"#2980b9"},
  {id:"cedear",l:"CEDEAR",c:"#8e44ad"},
  {id:"arg_stock",l:"Acción AR",c:"#c0392b"},
  {id:"arg_bond",l:"Bono AR",c:"#27ae60"},
  {id:"fci_usd",l:"FCI/USD",c:"#16a085"}
];
var PROFILES=["Conservador","Moderado","Balanceado","Dinámico","Agresivo"];
function ti(id){return TYPES.find(function(t){return t.id===id;})||TYPES[0];}

var LCM={
  green:{c:"#1a7a4a",bg:"#edf7f1",bo:"#b8dfc9",l:"En objetivo"},
  yellow:{c:"#a07010",bg:"#fdf8ec",bo:"#e8d48a",l:"Atención"},
  red:{c:"#b52a2a",bg:"#fdf0f0",bo:"#e8aaaa",l:"Desvío crítico"},
  grey:{c:"#a09a93",bg:"#f7f6f2",bo:"#e8e5df",l:"Sin datos"}
};

// Caché de precios para no exceder límites de API
var priceCache = {};

async function getPrice(a){
  var cacheKey = a.ticker + "_" + a.type;
  var cached = priceCache[cacheKey];
  if(cached && (Date.now() - cached.ts) < 60000) return cached.data;

  var result = {p:a.mp||0, ch:0, src:"Manual"};
  try{
    // CRYPTO → CoinGecko
    if(a.type==="crypto"){
      var map={BTC:"bitcoin",ETH:"ethereum",BNB:"binancecoin",SOL:"solana",ADA:"cardano",USDT:"tether",USDC:"usd-coin",XRP:"ripple",DOGE:"dogecoin",DOT:"polkadot"};
      var id=map[(a.ticker||"").toUpperCase()]||(a.ticker||"").toLowerCase();
      var r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids="+id+"&vs_currencies=usd&include_24hr_change=true");
      var d=await r.json();
      if(d[id]) result = {p:d[id].usd, ch:d[id].usd_24h_change||0, src:"CoinGecko"};
    }
    // US STOCKS y CEDEARs → Finnhub
    else if(a.type==="us_stock" || a.type==="cedear"){
      var tk = (a.ticker||"").toUpperCase().replace(".BA","");
      var r2=await fetch("https://finnhub.io/api/v1/quote?symbol="+tk+"&token="+FINNHUB_KEY);
      var d2=await r2.json();
      if(d2 && d2.c && d2.c > 0){
        var ch2 = d2.pc ? ((d2.c - d2.pc) / d2.pc)*100 : 0;
        result = {p:d2.c, ch:ch2, src:"Finnhub"};
      }
    }
    // ACCIONES AR y BONOS AR → Finnhub con sufijo
    else if(a.type==="arg_stock" || a.type==="arg_bond"){
      var tk3 = (a.ticker||"").toUpperCase().replace(".BA","");
      // Intentar primero con sufijo BCBA
      var r3=await fetch("https://finnhub.io/api/v1/quote?symbol=BCBA:"+tk3+"&token="+FINNHUB_KEY);
      var d3=await r3.json();
      if(d3 && d3.c && d3.c > 0){
        var ch3 = d3.pc ? ((d3.c - d3.pc) / d3.pc)*100 : 0;
        result = {p:d3.c, ch:ch3, src:"Finnhub BCBA"};
      } else {
        // Fallback: intentar sin sufijo
        var r3b=await fetch("https://finnhub.io/api/v1/quote?symbol="+tk3+"&token="+FINNHUB_KEY);
        var d3b=await r3b.json();
        if(d3b && d3b.c && d3b.c > 0){
          var ch3b = d3b.pc ? ((d3b.c - d3b.pc) / d3b.pc)*100 : 0;
          result = {p:d3b.c, ch:ch3b, src:"Finnhub"};
        }
      }
    }
    // FCI/USD → Bluelytics
    else if(a.type==="fci_usd"){
      var r4=await fetch("https://api.bluelytics.com.ar/v2/latest");
      var d4=await r4.json();
      result = {p:(d4.blue&&d4.blue.value_sell)||a.mp||1, ch:0, src:"Bluelytics"};
    }
  }catch(e){ console.log("Error precio "+a.ticker, e); }

  // Si no se obtuvo precio válido, usar precio manual
  if(!result.p && a.mp) result = {p:a.mp, ch:0, src:"Manual"};

  priceCache[cacheKey] = {data:result, ts:Date.now()};
  return result;
}

function teaF(tea,d){return Math.pow(1+tea/100,d/365);}
function tl(rp,tea,el){
  if(el<=0)return"grey";
  var delta=rp-(teaF(tea,el)-1)*100;
  return delta>=-2?"green":delta>=-8?"yellow":"red";
}
function fU(n){return n!=null?"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}):"—";}
function fP(n){return n!=null?(n>=0?"+":"")+n.toFixed(2)+"%":"—";}
function fD(d){return d?new Date(d).toLocaleDateString("es-AR",{day:"2-digit",month:"short",year:"numeric"}):"—";}
function fT(d){return d?d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}):"—";}

function MiniChart(props){
  var data=props.data||[];
  if(!data.length) return null;
  var W=400,H=140,PL=42,PR=10,PT=10,PB=24;
  var cw=W-PL-PR,ch=H-PT-PB;
  var targets=data.map(function(d){return d.target;});
  var reals=data.filter(function(d){return d.real!=null;}).map(function(d){return d.real;});
  var allVals=targets.concat(reals);
  var minV=Math.min.apply(null,allVals),maxV=Math.max.apply(null,allVals);
  var range=maxV-minV||1;
  function px(i){return PL+i*(cw/(data.length-1));}
  function py(v){return PT+ch-((v-minV)/range*ch);}
  var tPath=data.map(function(d,i){return(i===0?"M":"L")+px(i).toFixed(1)+","+py(d.target).toFixed(1);}).join(" ");
  var rPts=data.filter(function(d){return d.real!=null;});
  var rPath=rPts.map(function(d,i){var ix=data.indexOf(d);return(i===0?"M":"L")+px(ix).toFixed(1)+","+py(d.real).toFixed(1);}).join(" ");
  var ticks=[];for(var i=0;i<=4;i++)ticks.push(minV+range*i/4);
  var xlabels=[0,Math.floor(data.length/2),data.length-1].map(function(i){return{i:i,label:data[i]?data[i].date:""};});
  return h("svg",{viewBox:"0 0 "+W+" "+H,style:{width:"100%",height:H}},
    ticks.map(function(v,i){return h("g",{key:i},
      h("line",{x1:PL,y1:py(v).toFixed(1),x2:W-PR,y2:py(v).toFixed(1),stroke:"#e8e5df",strokeWidth:1}),
      h("text",{x:PL-4,y:py(v).toFixed(1),textAnchor:"end",fontSize:9,fill:"#a09a93",dominantBaseline:"middle",fontFamily:"monospace"},(v>=0?"+":"")+v.toFixed(0)+"%")
    );}),
    xlabels.map(function(x){return h("text",{key:x.i,x:px(x.i).toFixed(1),y:H-4,textAnchor:"middle",fontSize:9,fill:"#a09a93"},x.label);}),
    h("path",{d:tPath,fill:"none",stroke:"#c9973a",strokeWidth:1.5,strokeDasharray:"5,4"}),
    rPath?h("path",{d:rPath,fill:"none",stroke:"#2a4fd4",strokeWidth:2}):null,
    rPts.map(function(d){var ix=data.indexOf(d);return h("circle",{key:ix,cx:px(ix).toFixed(1),cy:py(d.real).toFixed(1),r:3,fill:"#2a4fd4"});})
  );
}

function App(){
  var _p=useState(function(){return sget(SK_P)||[];});var ports=_p[0],setPorts=_p[1];
  var _pr=useState({});var prices=_pr[0],setPrices=_pr[1];
  var _h=useState(function(){return sget(SK_H)||{};});var hist=_h[0],setHist=_h[1];
  var _v=useState("overview");var view=_v[0],setView=_v[1];
  var _a=useState(null);var aid=_a[0],setAid=_a[1];
  var _l=useState(false);var loading=_l[0],setLoading=_l[1];
  var _s=useState(null);var sync=_s[0],setSync=_s[1];
  var _np=useState({name:"",client:"",profile:"Moderado",tea:"",startDate:new Date().toISOString().slice(0,10),endDate:"",notes:""});
  var np=_np[0],setNp=_np[1];
  var _na=useState({name:"",ticker:"",type:"crypto",qty:"",cost:"",mp:""});var na=_na[0],setNa=_na[1];
  var _e=useState("");var err=_e[0],setErr=_e[1];
  var tmr=useRef(null);

  useEffect(function(){sset(SK_P,ports);},[ports]);
  useEffect(function(){sset(SK_H,hist);},[hist]);

  var refresh=useCallback(async function(){
    var all=ports.reduce(function(a,p){return a.concat(p.assets||[]);},[]);
    if(!all.length)return;
    setLoading(true);
    var res={};
    // Procesar de a uno para no saturar la API
    for(var i=0;i<all.length;i++){
      res[all[i].id]=await getPrice(all[i]);
    }
    setPrices(res);
    var today=new Date().toISOString().slice(0,10);
    setHist(function(prev){
      var next=Object.assign({},prev);
      ports.forEach(function(port){
        var assets=port.assets||[];
        var tv=assets.reduce(function(s,a){return s+((res[a.id]&&res[a.id].p)||a.mp||0)*a.qty;},0);
        var tc=assets.reduce(function(s,a){return s+a.cost*a.qty;},0);
        var rp=tc?((tv-tc)/tc)*100:0;
        if(!next[port.id])next[port.id]=[];
        var ex=next[port.id].find(function(s){return s.date===today;});
        if(!ex)next[port.id]=next[port.id].slice(-89).concat([{date:today,real:parseFloat(rp.toFixed(3))}]);
        else next[port.id]=next[port.id].map(function(s){return s.date===today?Object.assign({},s,{real:parseFloat(rp.toFixed(3))}):s;});
      });
      return next;
    });
    setSync(new Date());setLoading(false);
  },[ports]);

  useEffect(function(){
    clearInterval(tmr.current);
    if(ports.length){refresh();tmr.current=setInterval(refresh,90000);}
    return function(){clearInterval(tmr.current);};
  },[ports.length]);

  function calc(port){
    var assets=port.assets||[];
    var en=assets.map(function(a){
      var price=(prices[a.id]&&prices[a.id].p)||a.mp||0;
      return Object.assign({},a,{price:price,value:price*a.qty,costT:a.cost*a.qty,ch:(prices[a.id]&&prices[a.id].ch)||0,src:(prices[a.id]&&prices[a.id].src)||"—"});
    });
    var tv=en.reduce(function(s,a){return s+a.value;},0);
    var tc=en.reduce(function(s,a){return s+a.costT;},0);
    var rp=tc?((tv-tc)/tc)*100:0;
    var gain=tv-tc;
    var st=new Date(port.startDate),e=new Date(port.endDate),now=new Date();
    var el=Math.max(0,(now-st)/86400000);
    var tot=Math.max(1,(e-st)/86400000);
    var prog=Math.min(1,el/tot);
    var tea=parseFloat(port.tea)||0;
    var tNow=(teaF(tea,el)-1)*100;
    var tEnd=(teaF(tea,tot)-1)*100;
    var delta=rp-tNow;
    var lc=tl(rp,tea,el);
    var curve=[];
    for(var i=0;i<=50;i++){
      var d=tot*i/50;
      var dt=new Date(st.getTime()+d*86400000);
      curve.push({day:Math.round(d),date:dt.toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"}),target:parseFloat(((teaF(tea,d)-1)*100).toFixed(3))});
    }
    var snaps=hist[port.id]||[];
    var chartData=curve.map(function(pt){
      var dt=new Date(st.getTime()+pt.day*86400000);
      var snap=snaps.find(function(x){return Math.abs((new Date(x.date)-dt)/86400000)<1;});
      return Object.assign({},pt,{real:snap&&snap.real!=null?snap.real:(pt.day===0?0:undefined)});
    });
    return{en:en,tv:tv,tc:tc,rp:rp,gain:gain,el:el,tot:tot,prog:prog,tea:tea,tNow:tNow,tEnd:tEnd,delta:delta,lc:lc,chartData:chartData,daysLeft:Math.max(0,tot-el)};
  }

  function createPort(){
    if(!np.name||!np.client||!np.tea||!np.startDate||!np.endDate){setErr("Completá todos los campos.");return;}
    if(new Date(np.endDate)<=new Date(np.startDate)){setErr("La fecha fin debe ser posterior al inicio.");return;}
    var port=Object.assign({},np,{id:crypto.randomUUID(),tea:parseFloat(np.tea),assets:[],createdAt:new Date().toISOString()});
    setPorts(function(p){return p.concat([port]);});
    setNp({name:"",client:"",profile:"Moderado",tea:"",startDate:new Date().toISOString().slice(0,10),endDate:"",notes:""});
    setErr("");setAid(port.id);setView("portfolio");
  }

  function addAsset(){
    if(!na.name||!na.ticker||!na.qty||!na.cost){setErr("Completá los campos obligatorios.");return;}
    var asset={id:crypto.randomUUID(),name:na.name,ticker:na.ticker.toUpperCase(),type:na.type,qty:parseFloat(na.qty),cost:parseFloat(na.cost),mp:parseFloat(na.mp)||0};
    setPorts(function(prev){return prev.map(function(p){return p.id===aid?Object.assign({},p,{assets:(p.assets||[]).concat([asset])}):p;});});
    setNa({name:"",ticker:"",type:"crypto",qty:"",cost:"",mp:""});setErr("");setView("portfolio");
  }

  function remAsset(pid,a2){setPorts(function(prev){return prev.map(function(p){return p.id===pid?Object.assign({},p,{assets:(p.assets||[]).filter(function(a){return a.id!==a2;})}):p;});});}
  function delPort(id){setPorts(function(p){return p.filter(function(x){return x.id!==id;});});setView("overview");}
  function go(v,id){if(id)setAid(id);setView(v);}
  var aport=ports.find(function(p){return p.id===aid;});
  var am=aport?calc(aport):null;
  function lbl(t){return h("label",{style:{fontSize:12,color:"#6b6560",fontWeight:600,display:"block",marginBottom:5}},t);}
  function errB(){return err?h("div",{style:{background:"#fdf0f0",border:"1px solid #e8aaaa",borderRadius:8,padding:"9px 14px",marginBottom:14,fontSize:13,color:"#b52a2a"}},err):null;}

  var sidebar=h("aside",{style:{width:220,minWidth:220,background:"#fff",borderRight:"1px solid #e8e5df",display:"flex",flexDirection:"column"}},
    h("div",{style:{padding:"22px 18px 16px",borderBottom:"1px solid #e8e5df"}},
      h("div",{className:"serif",style:{fontSize:18,fontWeight:700,lineHeight:1.3}},"Portfolio",h("br"),h("span",{style:{color:"#2a4fd4"}},"Advisor")),
      h("div",{style:{fontSize:9,color:"#a09a93",marginTop:4,letterSpacing:".1em",fontWeight:600}},"GESTIÓN MULTI-CARTERA")
    ),
    h("nav",{style:{flex:1,padding:"12px 10px",overflowY:"auto"}},
      h("button",{onClick:function(){go("overview");},style:{width:"100%",textAlign:"left",padding:"9px 10px",borderRadius:6,border:"none",background:view==="overview"?"#eef1fc":"transparent",color:view==="overview"?"#2a4fd4":"#6b6560",fontWeight:600,fontSize:13,marginBottom:6}},"◈ Vista general"),
      h("div",{style:{fontSize:9,color:"#a09a93",letterSpacing:".1em",padding:"8px 10px 5px",fontWeight:600}},"CARTERAS"),
      ports.map(function(p){
        var m=calc(p),lc=LCM[m.lc],isA=view==="portfolio"&&aid===p.id;
        return h("button",{key:p.id,onClick:function(){go("portfolio",p.id);},style:{width:"100%",textAlign:"left",padding:"8px 10px",borderRadius:6,border:"none",background:isA?lc.bg:"transparent",color:"#1a1815",fontSize:12,marginBottom:2,display:"flex",alignItems:"center",gap:7}},
          h("span",{style:{color:lc.c,fontSize:9}},"●"),
          h("div",{style:{flex:1,overflow:"hidden"}},
            h("div",{style:{fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.name),
            h("div",{style:{fontSize:10,color:"#a09a93",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.client)
          )
        );
      }),
      h("button",{onClick:function(){setErr("");go("new-portfolio");},style:{width:"100%",textAlign:"left",padding:"8px 10px",borderRadius:6,border:"1px dashed #d4cfc7",background:"transparent",color:"#6b6560",fontSize:12,marginTop:8,fontWeight:500}},"+ Nueva cartera")
    ),
    h("div",{style:{padding:"10px 14px",borderTop:"1px solid #e8e5df",fontSize:10,color:"#a09a93",display:"flex",alignItems:"center",gap:6}},
      h("span",{className:"pulse",style:{width:6,height:6,borderRadius:"50%",background:loading?"#c9973a":"#1a7a4a",display:"inline-block",flexShrink:0}}),
      loading?"Actualizando…":"Sync "+fT(sync),
      (!loading&&ports.length>0)?h("button",{onClick:refresh,style:{marginLeft:"auto",background:"none",border:"none",color:"#a09a93",fontSize:15,padding:0,lineHeight:1}},"↻"):null
    )
  );

  function rOverview(){
    var all=ports.map(function(p){return calc(p);});
    var aum=all.reduce(function(s,m){return s+m.tv;},0);
    var gain=all.reduce(function(s,m){return s+m.gain;},0);
    var greens=all.filter(function(m){return m.lc==="green";}).length;
    var reds=all.filter(function(m){return m.lc==="red";}).length;
    return h("div",{style:{padding:"32px 36px"}},
      h("h1",{className:"serif",style:{fontSize:28,fontWeight:700,marginBottom:4}},"Vista General"),
      h("p",{style:{color:"#6b6560",fontSize:14,marginBottom:24}},ports.length+" "+(ports.length===1?"cartera":"carteras")+" activas"),
      ports.length===0
        ?h("div",{style:{textAlign:"center",padding:"80px 0"}},
            h("div",{className:"serif",style:{fontSize:56,color:"#d4cfc7",marginBottom:14}},"◈"),
            h("div",{style:{fontSize:16,fontWeight:600,color:"#6b6560",marginBottom:6}},"Todavía no hay carteras"),
            h("div",{style:{fontSize:13,color:"#a09a93",marginBottom:24}},"Creá la primera desde el panel lateral"),
            h("button",{onClick:function(){setErr("");go("new-portfolio");},style:{padding:"11px 24px",borderRadius:8,border:"none",background:"#1a1815",color:"#fff",fontSize:14,fontWeight:600}},"+ Nueva cartera"))
        :h("div",null,
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:12,marginBottom:28}},
              [{l:"AUM Total",v:fU(aum),c:"#1a1815"},{l:"Ganancia",v:(gain>=0?"+":"")+fU(gain),c:gain>=0?"#1a7a4a":"#b52a2a"},{l:"En objetivo",v:greens+" / "+ports.length,c:"#1a7a4a"},{l:"Desvío crítico",v:reds+" / "+ports.length,c:reds>0?"#b52a2a":"#6b6560"}].map(function(k,i){
                return h("div",{key:i,style:{background:"#fff",border:"1px solid #e8e5df",borderRadius:10,padding:"16px 18px"}},
                  h("div",{style:{fontSize:9,color:"#a09a93",fontWeight:600,letterSpacing:".09em",textTransform:"uppercase",marginBottom:8}},k.l),
                  h("div",{className:"mono",style:{fontSize:20,fontWeight:500,color:k.c}},k.v));
              })
            ),
            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}},
              ports.map(function(port){
                var m=calc(port),lc=LCM[m.lc];
                return h("div",{key:port.id,onClick:function(){go("portfolio",port.id);},style:{background:"#fff",border:"1px solid #e8e5df",borderRadius:12,padding:20,cursor:"pointer"},
                  onMouseEnter:function(e){e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.07)";},
                  onMouseLeave:function(e){e.currentTarget.style.boxShadow="none";}},
                  h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}},
                    h("div",null,h("div",{style:{fontWeight:700,fontSize:15}},port.name),h("div",{style:{fontSize:11,color:"#6b6560",marginTop:2}},port.client+" · "+port.profile)),
                    h("div",{style:{background:lc.bg,border:"1px solid "+lc.bo,borderRadius:20,padding:"3px 10px",display:"flex",alignItems:"center",gap:5,flexShrink:0}},
                      h("span",{style:{color:lc.c,fontSize:8}},"●"),h("span",{style:{color:lc.c,fontSize:11,fontWeight:600}},lc.l))
                  ),
                  h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}},
                    [{l:"Valor",v:fU(m.tv)},{l:"Rentab.",v:fP(m.rp),c:m.rp>=0?"#1a7a4a":"#b52a2a"},{l:"TEA obj.",v:port.tea+"%"}].map(function(x,i){

    return h("div",{style:{padding:"32px 36px",maxWidth:520}},

           ["GGAL","Galicia","arg_stock"],["YPFD","YPF","arg_stock"],["AL30","AL30","arg_bond"],["GD30","GD30","arg_bond"]];
    return h("div",{style:{padding:"32px 36px",maxWidth:480}},
      h("button",{onClick:function(){go("portfolio");},style:{background:"none",border:"none",color:"#a09a93",fontSize:12,padding:"0 0 10px",fontWeight:500}},"← Volver a "+aport.name),
      h("h1",{className:"serif",style:{fontSize:22,fontWeight:700,marginBottom:6}},"Agregar activo"),

      errB(),
      h("div",{style:{background:"#fff",border:"1px solid #e8e5df",borderRadius:12,padding:22,display:"flex",flexDirection:"column",gap:13}},

        h("div",null,lbl("Ticker *"),h("input",{value:na.ticker,onChange:function(e){setNa(function(p){return Object.assign({},p,{ticker:e.target.value});});},placeholder:"ej. AAPL · BTC · GGAL · AL30"})),

        ),
        h("div",null,lbl("Precio manual (fallback si API falla)"),h("input",{type:"number",value:na.mp,onChange:function(e){setNa(function(p){return Object.assign({},p,{mp:e.target.value});});},placeholder:"opcional — recomendado para acciones AR"})),

          )

        h("div",{style:{display:"flex",gap:10}},
          h("button",{onClick:function(){go("portfolio");},style:{flex:1,padding:11,borderRadius:8,border:"1px solid #e8e5df",background:"#fff",color:"#6b6560",fontSize:13,fontWeight:600}},"Cancelar"),

  return h("div",{style:{display:"flex",height:"100vh",overflow:"hidden",background:"#f7f6f2"}},

      view==="portfolio"?rPortfolio():null,
      view==="new-portfolio"?rNewPort():null,
      view==="add-asset"?rAddAsset():null
    )
  );
}
